name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        emacs-version: ['28.2', '29.4', '30.1']
    steps:
      - uses: actions/checkout@v4

      - uses: purcell/setup-emacs@master
        with:
          version: ${{ matrix.emacs-version }}

      - name: Byte-compile
        run: |
          emacs --batch -L . \
            --eval "(setq byte-compile-error-on-warn t)" \
            -f batch-byte-compile lark-core.el lark-auth.el lark-calendar.el lark-tasks.el lark-transient.el lark.el

      - name: Run tests
        run: |
          emacs --batch -L . -L test \
            -l lark-core-test \
            -l lark-calendar-test \
            -l lark-tasks-test \
            -f ert-run-tests-batch-and-exit
